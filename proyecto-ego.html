<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beats X | Luis Blasco-Ibáñez</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>

/* ===== DESIGN SYSTEM ===== */
:root {
    --bg: #000;
    --accent: #FF5A00;
    --accent-glow: rgba(255, 90, 0, 0.15);
    --card-bg: rgba(25,25,27,0.4);
    --border: rgba(255,255,255,0.05);
    --text: #f3f3f3;
    --text-dim: #8b8b8d;
    --glass: rgba(10,10,12,0.1);
    --blur: blur(35px);

    /* spacing system */
    --space-xs: 10px;
    --space-sm: 30px;
    --space-md: 80px;
    --space-lg: 140px;
    --space-xl: 200px;
}

.light-mode {
    --bg:#f2f2f4;
    --card-bg:rgba(255,255,255,0.6);
    --border:rgba(0,0,0,0.06);
    --text:#111;
    --text-dim:#5c5c5f;
    --glass:rgba(255,255,255,0.2);
    --accent-glow:rgba(255,90,0,0.05);
}

* {margin:0;padding:0;box-sizing:border-box;cursor:none;}
body {
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
}

/* ===== BACKGROUND ===== */
body::before {
    content:"";
    position:fixed;
    top:0; left:50%;
    width:150vw; height:150vh;
    background:radial-gradient(circle at center 20%,var(--accent-glow),transparent 60%);
    transform:translateX(-50%);
    z-index:-1;
}

/* ===== HEADER ===== */
.navbar-wrapper {
    position:fixed;
    top:30px;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:2000;
    transition:transform .5s;
}
.ui-hidden { transform:translateY(-130px); }

header {
    background:var(--glass);
    backdrop-filter:var(--blur);
    padding:12px 35px;
    border-radius:100px;
    border:1px solid var(--border);
    display:flex;
    align-items:center;
    gap:40px;
}

.nav-logo {font-family:'Syne';font-weight:800;text-decoration:none;color:var(--text);}
.nav-links a {text-decoration:none;color:var(--text);opacity:.6;font-size:.8rem;}
.tools-nav {display:flex;gap:10px;}

/* ===== PROJECT HEADER ===== */
.project-header {
    padding:var(--space-xl) 5vw var(--space-sm);
    max-width:1600px;
    margin:auto;
}
.project-title {
    font-family:'Syne';
    font-size:clamp(3rem,7vw,6.5rem);
    font-weight:800;
}

/* ===== META ===== */
.project-meta {
    display:flex;
    flex-wrap:wrap;
    gap:60px;
    margin-top:var(--space-sm);
    padding:var(--space-sm) 0;
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
}

/* ===== SECTIONS ===== */
.split-section {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:var(--space-md);
    padding:var(--space-md) 5vw;
    max-width:1600px;
    margin:auto;
    align-items:center;
}

.split-section img {
    width:100%;
    height:70vh;
    object-fit:cover;
    border-radius:20px;
    border:1px solid var(--border);
}

.split-text {
    font-size:1.1rem;
    color:var(--text-dim);
    line-height:1.8;
}

.large-image-section {
    padding:var(--space-md) 5vw;
    max-width:1600px;
    margin:auto;
}

.large-image-section img {
    width:100%;
    height:85vh;
    object-fit:cover;
    border-radius:30px;
    border:1px solid var(--border);
}

/* ===== NEXT ===== */
.next-project {
    padding:var(--space-lg) 5vw;
    text-align:center;
    background:var(--card-bg);
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
}

/* ===== FOOTER ===== */
footer {
    padding:var(--space-lg) 5vw;
    text-align:center;
    border-top:1px solid var(--border);
}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
    .split-section {
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="navbar-wrapper" id="navbar">
<header>
<a href="index.html" class="nav-logo">L|BIB</a>
<nav class="nav-links">
<a href="index.html#work">VOLVER</a>
</nav>
<div class="tools-nav">
<button id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
</div>
</header>
</div>

<main>

<section class="project-header" data-aos="fade-up">
<h1 class="project-title">Beats X</h1>
<div class="project-meta">
<div><span>Rol</span><span>Hardware Developer</span></div>
<div><span>Categoría</span><span>Consumer Electronics</span></div>
<div><span>Año</span><span>2021</span></div>
</div>
</section>

<!-- SECCIONES -->
<section class="split-section" data-aos="fade-up">
<img src="2 LAMPARA.jpg">
<p class="split-text">Texto proyecto...</p>
</section>

<section class="split-section" data-aos="fade-up">
<p class="split-text">Texto proyecto...</p>
<img src="3 LAMPARA.jpg">
</section>

<section class="large-image-section" data-aos="fade-up">
<img src="PLANOLAMP1.jpg">
</section>

<section class="split-section" data-aos="fade-up">
<img src="4 LAMPARA.jpg">
<p class="split-text">Texto proyecto...</p>
</section>

<section class="split-section" data-aos="fade-up">
<p class="split-text">Texto proyecto...</p>
<img src="6 LAMPARA.jpg">
</section>

<section class="large-image-section" data-aos="fade-up">
<img src="PLANOLAMP2.jpg">
</section>

</main>

<a href="#" class="next-project">
Siguiente Proyecto
</a>

<footer>
L|BIB · INDUSTRIAL DESIGN
</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init({duration:800,once:true});

document.getElementById("theme-toggle")
.addEventListener("click",()=>document.body.classList.toggle("light-mode"));

let lastScroll=0;
const navbar=document.getElementById("navbar");

window.addEventListener("scroll",()=>{
let current=window.pageYOffset;
if(current>lastScroll && current>100) navbar.classList.add("ui-hidden");
else navbar.classList.remove("ui-hidden");
lastScroll=current;
});
</script>

</body>
</html>
