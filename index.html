<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis Blasco-Ibáñez Berbel | Industrial Design</title>

    <!-- FUENTES -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- TAILWIND CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        syne: ['Syne', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        accent: '#8b5cf6',
                    }
                }
            }
        }
    </script>

    <!-- REACT, BUNDLES & MOTION VIA CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * { cursor: none; }
        body { background-color: #050505; color: white; overflow-x: hidden; }
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(139, 92, 246, 0.15), transparent);
            z-index: -1; pointer-events: none;
        }
        #cursor {
            width: 14px; height: 14px; border: 1px solid #8b5cf6;
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
            transition: transform 0.15s ease-out; transform: translate(-50%, -50%);
        }
        section { scroll-margin-top: 100px; }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="bg-glow"></div>
    <div id="root"></div>

    <!-- SCRIPT BABEL (JSX) -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- MINI UTILIDAD PARA CLASES (sustituye a 'cn') ---
        function cn(...classes) {
            return classes.filter(Boolean).join(' ');
        }

        // --- COMPONENTE TUBELIGHT NAVBAR ---
        const NavBar = ({ items }) => {
            const [activeTab, setActiveTab] = useState(items[0].name);
            const [isMobile, setIsMobile] = useState(false);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                handleResize();
                window.addEventListener("resize", handleResize);
                return () => window.removeEventListener("resize", handleResize);
            }, []);

            return (
                <div className="fixed bottom-0 sm:top-0 left-1/2 -translate-x-1/2 z-[100] mb-6 sm:pt-6 h-fit pointer-events-auto">
                    <div className="flex items-center gap-2 bg-black/40 border border-white/10 backdrop-blur-lg py-1 px-1 rounded-full shadow-2xl">
                        {items.map((item) => {
                            const isActive = activeTab === item.name;
                            return (
                                <a
                                    key={item.name}
                                    href={item.url}
                                    onClick={() => setActiveTab(item.name)}
                                    className={cn(
                                        "relative cursor-pointer text-xs font-semibold px-4 py-2 rounded-full transition-colors",
                                        "text-zinc-400 hover:text-white",
                                        isActive && "text-violet-400"
                                    )}
                                >
                                    <span className="hidden md:inline tracking-widest uppercase">{item.name}</span>
                                    <span className="md:hidden flex items-center justify-center p-1">
                                        <i data-lucide={item.iconName}></i>
                                    </span>
                                    
                                    {isActive && (
                                        <motion.div
                                            layoutId="lamp"
                                            className="absolute inset-0 w-full bg-violet-500/10 rounded-full -z-10"
                                            transition={{ type: "spring", stiffness: 300, damping: 30 }}
                                        >
                                            <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-8 h-1 bg-violet-500 rounded-t-full shadow-[0_-5px_15px_rgba(139,92,246,0.5)]">
                                                <div className="absolute w-12 h-6 bg-violet-500/20 rounded-full blur-md -top-2 -left-2" />
                                            </div>
                                        </motion.div>
                                    )}
                                </a>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // --- COMPONENTE APP ---
        const App = () => {
            const navItems = [
                { name: 'Inicio', url: '#home', iconName: 'home' },
                { name: 'Sobre mí', url: '#about', iconName: 'user' },
                { name: 'Portfolio', url: '#work', iconName: 'briefcase' },
                { name: 'Skills', url: '#skills', iconName: 'layers' },
                { name: 'CV', url: '#cv', iconName: 'file-text' }
            ];

            useEffect(() => {
                // Inicializar iconos de Lucide
                lucide.createIcons();
            }, []);

            return (
                <div className="font-inter">
                    <NavBar items={navItems} />

                    {/* HERO */}
                    <section id="home" className="h-screen flex flex-col justify-center px-[10%]">
                        <motion.div 
                            initial={{ opacity: 0, y: 20 }} 
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.8 }}
                        >
                            <h1 className="text-[12vw] md:text-[8rem] font-syne font-extrabold leading-[0.85] tracking-tight uppercase italic text-white">
                                LUIS<br />BLASCO-IBÁÑEZ<br />BERBEL
                            </h1>
                            <p className="mt-8 text-violet-400 font-bold tracking-[6px] uppercase text-sm md:text-lg">
                                PORTFOLIO | DISEÑADOR INDUSTRIAL
                            </p>
                        </motion.div>
                    </section>

                    {/* SOBRE MÍ */}
                    <section id="about" className="py-32 px-[10%]">
                        <h2 className="text-4xl font-syne font-bold uppercase mb-16">Sobre mí.</h2>
                        <div className="grid md:grid-cols-2 gap-16 items-start">
                            <div className="text-zinc-400 text-lg leading-relaxed">
                                <p>Soy un diseñador industrial especializado en convertir ideas técnicas complejas en soluciones simples y elegantes. Mi enfoque combina CAD avanzado con una profunda sensibilidad estética para el mercado moderno.</p>
                                <p className="mt-6">Tengo experiencia técnica en fabricación y optimización de materiales poliméricos, garantizando que el diseño sea tan funcional como visualmente impactante.</p>
                            </div>
                            <div className="bg-zinc-900 border border-white/10 p-2 rounded-2xl rotate-3 hover:rotate-0 transition-transform duration-500 shadow-2xl">
                                <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&w=800&q=80" className="rounded-xl grayscale hover:grayscale-0 transition-all duration-700" alt="Profile"/>
                            </div>
                        </div>
                    </section>

                    {/* PORTFOLIO (Simplificado para el demo) */}
                    <section id="work" className="py-32 px-[10%] bg-zinc-900/20">
                        <h2 className="text-4xl font-syne font-bold uppercase mb-16">Portfolio.</h2>
                        <div className="grid md:grid-cols-3 gap-8">
                            {[1581092160562, 155859171004b, 1523275335684].map((imgId, idx) => (
                                <div key={idx} className="group relative overflow-hidden rounded-3xl border border-white/5 bg-zinc-900">
                                    <div className="h-72 overflow-hidden">
                                        <img src={`https://images.unsplash.com/photo-${imgId}?auto=format&w=600`} className="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700" />
                                    </div>
                                    <div className="p-6">
                                        <h3 className="font-bold uppercase tracking-tight">Proyecto Industrial 0{idx+1}</h3>
                                        <p className="text-zinc-500 text-xs mt-2 uppercase">CAD / Rendering / DFM</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* HABILIDADES GRID */}
                    <section id="skills" className="py-32 px-[10%]">
                        <h2 className="text-4xl font-syne font-bold uppercase mb-16">Habilidades.</h2>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            {[
                                {t: "Solidworks", d: "CAD Avanzado"},
                                {t: "Rhino 3D", d: "Surfacing A"},
                                {t: "Keyshot", d: "Hyper-render"},
                                {t: "DFM/DFA", d: "Industrialización"},
                                {t: "3D Print", d: "SLA / FDM"},
                                {t: "Photoshop", d: "Post-procesado"},
                                {t: "Concept", d: "Digital Sketch"},
                                {t: "Prototipado", d: "Físico & UX"}
                            ].map((skill, i) => (
                                <div key={i} className="p-8 border border-white/5 bg-white/5 rounded-2xl hover:border-violet-500/50 transition-colors group">
                                    <h4 className="font-bold text-white uppercase group-hover:text-violet-400 transition-colors">{skill.t}</h4>
                                    <p className="text-zinc-500 text-sm mt-1">{skill.d}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="py-20 border-t border-white/5 text-center text-zinc-600">
                        <div className="text-white font-syne font-bold mb-4 tracking-tighter text-2xl">L|BIB</div>
                        <p>© 2024 / Luis Blasco-Ibáñez Berbel</p>
                        <p className="text-xs mt-2">Design meets Technology.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // CURSOR ANIMADO (Vanilla JS)
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('mouseover', e => {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') {
                cursor.style.transform = 'translate(-50%, -50%) scale(2.5)';
            } else {
                cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            }
        });
    </script>
</body>
</html>
