<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis Blasco-Ibáñez Berbel | Industrial Design</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* ================= VARIABLES ================= */
        :root {
            --bg: #050505;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --card-bg: rgba(20, 20, 20, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --glass: rgba(5, 5, 5, 0.45);
        }

        .light-mode {
            --bg: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.1);
            --text: #1d1d1f;
            --text-dim: #424245;
            --glass: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
            transition: background 0.5s ease;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -20%, var(--accent-glow), transparent);
            z-index: -1;
        }

        /* ================= CURSOR ================= */
        #cursor {
            width: 10px;
            height: 10px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.15s ease, background 0.15s ease;
        }

        /* ================= HEADER ================= */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(35px);
            padding: 18px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            border-bottom: 1px solid var(--border);
            transition: transform 0.4s ease;
        }

        header.nav-hidden {
            transform: translateY(-100%);
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #theme-toggle {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            width: 35px;
            height: 35px;
            border-radius: 50%;
        }

        /* ================= SECTIONS ================= */
        section {
            padding: 260px 10% 160px;
        }

        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            flex-direction: column;
            padding: 0 10%;
        }

        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3rem, 12vw, 7.5rem);
            line-height: 0.85;
            letter-spacing: -6px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .subtitle {
            color: var(--accent);
            letter-spacing: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }

        h2.section-title {
            font-family: 'Syne', sans-serif;
            font-size: 3.2rem;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* ================= ABOUT ================= */
        .about-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 80px;
            align-items: center;
        }

        .about-text {
            font-size: 1.1rem;
            color: var(--text-dim);
            line-height: 1.8;
        }

        .about-photo {
            width: 100%;
            border-radius: 24px;
            border: 1px solid var(--border);
            filter: grayscale(100%);
        }

        /* ================= PORTFOLIO ================= */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 22px;
            overflow: hidden;
            transition: 0.4s;
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
        }

        .project-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            opacity: 0.6;
        }

        /* ================= CV ================= */
        .cv-item {
            display: flex;
            gap: 50px;
            padding: 45px 0;
            border-bottom: 1px solid var(--border);
        }

        .cv-year {
            min-width: 160px;
            font-family: 'Syne', sans-serif;
            color: var(--accent);
            font-weight: 800;
        }

        /* ================= FOOTER ================= */
        .site-footer {
            padding: 80px 10% 60px;
            text-align: center;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--text-dim);
            opacity: 0.3;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .portfolio-grid {
                grid-template-columns: 1fr;
            }

            h2.section-title {
                font-size: 2.2rem;
            }

            .site-footer {
                font-size: 0.65rem;
                padding: 60px 8% 40px;
            }
        }
    </style>
</head>

<body>

<div id="cursor"></div>

<header id="navbar">
    <div class="nav-logo">L|BIB</div>
    <div class="header-actions">
        <nav class="nav-links">
            <a href="#about">Sobre mí</a>
            <a href="#work">Portfolio</a>
            <a href="#cv">Curriculum</a>
            <a href="#contact">Contacto</a>
        </nav>
        <button id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
    </div>
</header>

<section class="hero">
    <h1>LUIS<br>BLASCO-IBÁÑEZ<br>BERBEL</h1>
    <p class="subtitle">PORTFOLIO · DISEÑADOR INDUSTRIAL</p>
</section>

<section id="about">
    <h2 class="section-title">Sobre mí</h2>
    <div class="about-container">
        <div class="about-text">
            <p>Tengo 24 años y soy diseñador industrial de Valencia...</p>
        </div>
        <img src="https://via.placeholder.com/350x450" class="about-photo">
    </div>
</section>

<footer class="site-footer">
    <p>© 2024 — Luis Blasco-Ibáñez Berbel · Industrial Designer</p>
</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ once: true });

    const cursor = document.getElementById("cursor");
    document.addEventListener("mousemove", e => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
    });

    document.querySelectorAll("a, button, .project-card").forEach(el => {
        el.addEventListener("mouseenter", () => {
            cursor.style.transform = "translate(-50%, -50%) scale(2)";
            cursor.style.background = "var(--accent)";
        });
        el.addEventListener("mouseleave", () => {
            cursor.style.transform = "translate(-50%, -50%) scale(1)";
            cursor.style.background = "transparent";
        });
    });
</script>

</body>
</html>
