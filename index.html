    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis Blasco-Ibáñez | Industrial Design</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --bg: #030303;
            --accent: #FF5A00; 
            --accent-glow: rgba(255, 90, 0, 0.15);
            --card-bg: rgba(25, 25, 27, 0.4);
            --border: rgba(255, 255, 255, 0.05);
            --text: #f3f3f3;
            --text-dim: #8b8b8d;
            --glass: rgba(10, 10, 12, 0.1); 
            --blur: blur(35px);
        }

        .light-mode {
            --bg: #f2f2f4;
            --card-bg: rgba(255, 255, 255, 0.6);
            --border: rgba(0, 0, 0, 0.06);
            --text: #111112;
            --text-dim: #5c5c5f;
            --glass: rgba(255, 255, 255, 0.2);
            --accent-glow: rgba(255, 90, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; scroll-behavior: smooth; }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; line-height: 1.5;
            transition: background 0.7s cubic-bezier(0.8, 0, 0.2, 1), color 0.7s;
        }

        .lang-node { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: inline-block; }
        .lang-animating { opacity: 0.2 !important; filter: blur(10px); transform: scale(0.97); }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9998;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04; mix-blend-mode: overlay;
        }

        #cursor-dot { width: 8px; height: 8px; background: var(--text); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; will-change: transform; transition: opacity 0.3s ease; }
        #cursor-ring { width: 45px; height: 45px; border: 1.5px solid var(--border); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9997; transition: width 0.25s cubic-bezier(0.16, 1, 0.3, 1), height 0.25s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s ease; will-change: transform; }
        .hovered-element #cursor-ring { width: 55px; height: 55px; background: var(--text); mix-blend-mode: difference; border-width: 0; }
        .hovered-element #cursor-dot { opacity: 0; }
