<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Contacto</title>
</head>
<body>
    <nav>...</nav> <!-- Copia el mismo menú -->
    <div class="container">
        <h1>Hablemos.</h1>
        <p class="lead">¿Tienes una idea? Vamos a construirla juntos.</p>
        <form style="display: flex; flex-direction: column; gap: 20px; max-width: 500px;">
            <input type="text" placeholder="Tu Nombre" style="padding: 15px; border-radius: 12px; border: 1px solid var(--gray-border);">
            <input type="email" placeholder="Tu Email" style="padding: 15px; border-radius: 12px; border: 1px solid var(--gray-border);">
            <textarea placeholder="Mensaje" rows="5" style="padding: 15px; border-radius: 12px; border: 1px solid var(--gray-border);"></textarea>
            <button type="submit" class="btn">Enviar Mensaje →</button>
        </form>
    </div>
</body>
</html>
